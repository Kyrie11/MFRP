tensor:
  candidate_feature_dim: 20
  scene_feature_dim: 32
  future_steps: 80
  state_dim: 5
rollout:
  backend: waymax
  ego_execution_mode: state_control
  debug_allow_fallback: false
  policy_variants: [neutral_idm, conservative_idm, assertive_idm]
labels:
  branch_set: [keep, cede, brake, accelerate, pass, nonconflict]
  ceding_branches: [cede, brake]
  high_pressure_burden_threshold: 1.0
planning:
  alpha: 0.05
  beta_calibration: 0.1
  nu_bar: 0.3
  gamma_bar: 2.0
